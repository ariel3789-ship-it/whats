<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Consola · Mensajes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#14161a;          /* grafito */
    --panel:#1b1e24;       /* superficies */
    --panel-2:#22262e;     /* superficie elevada */
    --line:#2c313b;        /* bordes */
    --ink:#e8eaed;         /* texto principal */
    --ink-dim:#9aa2ad;     /* texto secundario */
    --ink-faint:#5f6773;   /* metadata */
    --accent:#e8b23a;      /* latón, acento neutro */
    --in:#22262e;          /* burbuja recibida */
    --out:#2a3546;         /* burbuja enviada */
    --danger:#d9634b;
    --ok:#4a9d6b;
    --radius:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:"Space Grotesk",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  #root{height:100vh}
  button{font-family:inherit;cursor:pointer}
  .mono{font-family:"JetBrains Mono",monospace}

  /* ---------- layout ---------- */
  .app{display:grid;grid-template-columns:78px 320px 1fr;height:100vh}
  @media (max-width:820px){
    .app{grid-template-columns:1fr}
    .rail,.list{display:none}
    .app.view-list .list{display:flex}
    .app.view-list .rail{display:flex}
    .app.view-list .chat{display:none}
    .app.view-chat .chat{display:flex}
  }

  /* ---------- rail de líneas ---------- */
  .rail{
    background:#101216;border-right:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;
    padding:16px 0;gap:14px;
  }
  .rail .brand{
    font-weight:700;font-size:11px;letter-spacing:.14em;
    color:var(--ink-faint);writing-mode:vertical-rl;transform:rotate(180deg);
    margin-bottom:6px;text-transform:uppercase;
  }
  .linedot{
    width:46px;height:46px;border-radius:12px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink-dim);
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:15px;position:relative;
    transition:transform .12s ease,border-color .12s ease;
  }
  .linedot:hover{transform:translateY(-1px)}
  .linedot.active{border-color:var(--ln);color:#fff;box-shadow:inset 0 0 0 1px var(--ln)}
  .linedot .strip{position:absolute;left:-1px;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--ln);opacity:0;transition:opacity .12s}
  .linedot.active .strip{opacity:1}
  .linedot .dot{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:"JetBrains Mono",monospace}
  .linedot.off{opacity:.4}

  /* ---------- lista de chats ---------- */
  .list{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0}
  .list-head{padding:18px 18px 12px;border-bottom:1px solid var(--line)}
  .list-head h1{margin:0;font-size:15px;font-weight:600;display:flex;align-items:center;gap:9px}
  .swatch{width:10px;height:10px;border-radius:3px;background:var(--ln)}
  .list-head .sub{margin-top:3px;font-size:11px;color:var(--ink-faint);letter-spacing:.02em}
  .search{padding:10px 14px;border-bottom:1px solid var(--line)}
  .search input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:8px 11px;font-size:13px;font-family:inherit;outline:none}
  .search input:focus{border-color:var(--ln)}
  .chats{overflow-y:auto;flex:1}
  .chatrow{padding:12px 16px;border-bottom:1px solid #23272f;display:flex;flex-direction:column;gap:3px;position:relative}
  .chatrow:hover{background:var(--panel-2)}
  .chatrow.active{background:var(--panel-2)}
  .chatrow.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ln)}
  .chatrow .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .chatrow .name{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chatrow .num{font-size:11px;color:var(--ink-faint)}
  .chatrow .time{font-size:10.5px;color:var(--ink-faint);white-space:nowrap}
  .chatrow .last{font-size:12px;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;justify-content:space-between;gap:8px}
  .badge{background:var(--ok);color:#04120a;border-radius:9px;min-width:18px;height:18px;padding:0 5px;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:"JetBrains Mono",monospace}
  .empty{padding:40px 20px;text-align:center;color:var(--ink-faint);font-size:13px;line-height:1.6}

  /* ---------- ventana de chat ---------- */
  .chat{background:var(--bg);display:flex;flex-direction:column;min-width:0}
  .chat-head{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;background:var(--panel)}
  .back{display:none;background:none;border:none;color:var(--ink-dim);font-size:20px;padding:0 4px}
  @media (max-width:820px){.back{display:block}}
  .chat-head .who{min-width:0}
  .chat-head .who .n{font-weight:600;font-size:14px}
  .chat-head .who .c{font-size:11.5px;color:var(--ink-faint)}
  .chat-head .tag{margin-left:auto;font-size:10.5px;color:var(--ln);border:1px solid var(--ln);padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:.04em}
  .stream{flex:1;overflow-y:auto;padding:22px 20px;display:flex;flex-direction:column;gap:8px}
  .bubble{max-width:66%;padding:9px 13px;border-radius:12px;font-size:13.5px;line-height:1.45;word-wrap:break-word;position:relative}
  .bubble .meta{font-size:10px;color:var(--ink-faint);margin-top:4px;font-family:"JetBrains Mono",monospace;display:flex;gap:6px;align-items:center}
  .bubble.in{align-self:flex-start;background:var(--in);border:1px solid var(--line);border-bottom-left-radius:4px}
  .bubble.out{align-self:flex-end;background:var(--out);border-bottom-right-radius:4px}
  .daysep{align-self:center;font-size:10.5px;color:var(--ink-faint);background:var(--panel);padding:3px 12px;border-radius:20px;margin:6px 0;font-family:"JetBrains Mono",monospace}

  /* ---------- composer ---------- */
  .composer{border-top:1px solid var(--line);padding:12px 16px;background:var(--panel)}
  .window-note{font-size:11px;color:var(--danger);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .composer .box{display:flex;gap:10px;align-items:flex-end}
  .composer textarea{flex:1;resize:none;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:10px 12px;font-size:13.5px;font-family:inherit;max-height:120px;outline:none;line-height:1.4}
  .composer textarea:focus{border-color:var(--ln)}
  .send{background:var(--ln);color:#0d0f12;border:none;border-radius:10px;padding:0 18px;height:40px;font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:6px}
  .send:disabled{opacity:.4;cursor:not-allowed}

  /* ---------- placeholder / gate ---------- */
  .center{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ink-faint);gap:14px;text-align:center;padding:30px}
  .center .big{font-size:15px;color:var(--ink-dim)}
  .gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:20}
  .gate .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:30px;width:340px;max-width:90vw}
  .gate h2{margin:0 0 4px;font-size:16px}
  .gate p{margin:0 0 18px;font-size:12.5px;color:var(--ink-dim);line-height:1.5}
  .gate input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:10px 12px;font-size:13.5px;font-family:"JetBrains Mono",monospace;outline:none;margin-bottom:12px}
  .gate input:focus{border-color:var(--accent)}
  .gate button{width:100%;background:var(--accent);color:#0d0f12;border:none;border-radius:8px;padding:11px;font-weight:700;font-size:13.5px}
  .gate .err{color:var(--danger);font-size:12px;margin-top:10px;min-height:16px}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel-2);border:1px solid var(--line);color:var(--ink);padding:10px 16px;border-radius:10px;font-size:13px;z-index:30;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .toast.err{border-color:var(--danger)}
  .spin{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--ink-dim);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#2c313b;border-radius:5px}
  ::-webkit-scrollbar-track{background:transparent}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
<script>
// Fallback de CDN por si unpkg no responde.
(function(){
  function need(g,src){ if(!window[g]){ document.write('<script src="'+src+'"><\/script>'); } }
  need("React","https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js");
  need("ReactDOM","https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js");
  need("htm","https://cdn.jsdelivr.net/npm/htm@3.1.1/dist/htm.umd.js");
})();
</script>
<script>
// Si algo no cargó, mostramos un mensaje claro en vez de "Script error."
if(!window.React || !window.ReactDOM || !window.htm){
  document.getElementById("root").innerHTML =
    '<div style="color:#e8eaed;font-family:sans-serif;padding:40px;line-height:1.6">'+
    '<b>No se pudieron cargar las librerías (React/htm).</b><br>'+
    'Suele pasar sin conexión o al abrir el archivo con file://. '+
    'Subilo a Vercel o serví la carpeta con un servidor local.</div>';
  throw new Error("Librerías no cargadas");
}
window.addEventListener("error", function(e){
  console.error("Error capturado:", e.message, e.filename, e.lineno);
});

const { useState, useEffect, useRef, useCallback } = React;
const html = htm.bind(React.createElement);

// clave del panel guardada en memoria (no localStorage por restricción del entorno)
let PANEL_KEY = "";

async function api(path, opts = {}) {
  const headers = { "Content-Type": "application/json", ...(opts.headers||{}) };
  if (PANEL_KEY) headers["x-panel-key"] = PANEL_KEY;
  const res = await fetch(path, { ...opts, headers });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw Object.assign(new Error(data.error || "Error"), { data, status: res.status });
  return data;
}

function fmtTime(ts){
  if(!ts) return "";
  const d = new Date(ts);
  return d.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
}
function fmtDay(ts){
  const d = new Date(ts), t = new Date();
  const same = d.toDateString()===t.toDateString();
  const y = new Date(t.getTime()-864e5);
  if(same) return "Hoy";
  if(d.toDateString()===y.toDateString()) return "Ayer";
  return d.toLocaleDateString("es-AR",{day:"2-digit",month:"short"});
}
function fmtRel(ts){
  if(!ts) return "";
  const s=(Date.now()-ts)/1000;
  if(s<60) return "ahora";
  if(s<3600) return Math.floor(s/60)+"m";
  if(s<86400) return Math.floor(s/3600)+"h";
  return Math.floor(s/86400)+"d";
}

// ---------------- Gate (clave del panel) ----------------
function Gate({ onOk }){
  const [v,setV]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const enter=async()=>{
    setBusy(true);setErr("");
    PANEL_KEY=v.trim();
    try{ await api("/api/lines"); onOk(); }
    catch(e){ setErr(e.status===401?"Clave incorrecta":"No se pudo conectar"); PANEL_KEY=""; }
    finally{ setBusy(false); }
  };
  return html`
    <div class="gate">
      <div class="card">
        <h2>Consola de mensajes</h2>
        <p>Ingresá la clave de acceso del panel para continuar.</p>
        <input type="password" placeholder="Clave del panel" value=${v}
          onInput=${e=>setV(e.target.value)}
          onKeyDown=${e=>e.key==="Enter"&&enter()} autoFocus />
        <button onClick=${enter} disabled=${busy}>${busy?"Verificando…":"Entrar"}</button>
        <div class="err">${err}</div>
      </div>
    </div>`;
}

// ---------------- App ----------------
function App(){
  const [ready,setReady]=useState(false);
  const [lines,setLines]=useState([]);
  const [activeLine,setActiveLine]=useState(null);
  const [convs,setConvs]=useState([]);
  const [activeContact,setActiveContact]=useState(null);
  const [messages,setMessages]=useState([]);
  const [canFreeText,setCanFreeText]=useState(true);
  const [draft,setDraft]=useState("");
  const [sending,setSending]=useState(false);
  const [q,setQ]=useState("");
  const [mobileView,setMobileView]=useState("list");
  const [toast,setToast]=useState(null);
  const streamRef=useRef(null);

  const showToast=(m,isErr)=>{setToast({m,isErr});setTimeout(()=>setToast(null),3500);};

  // carga inicial de líneas
  useEffect(()=>{ if(!ready) return;
    api("/api/lines").then(d=>{
      setLines(d.lines);
      const first=d.lines.find(l=>l.configured)||d.lines[0];
      if(first) setActiveLine(first.id);
    }).catch(()=>showToast("No se pudieron cargar las líneas",true));
  },[ready]);

  const curLine=lines.find(l=>l.id===activeLine);
  const lnColor=curLine?curLine.color:"#e8b23a";

  // polling de conversaciones de la línea activa
  const loadConvs=useCallback(()=>{
    if(!activeLine) return;
    api(`/api/conversations?line=${activeLine}`)
      .then(d=>setConvs(d.conversations))
      .catch(()=>{});
  },[activeLine]);

  useEffect(()=>{ if(!activeLine) return;
    setConvs([]);setActiveContact(null);setMessages([]);
    loadConvs();
    const t=setInterval(loadConvs,5000);
    return ()=>clearInterval(t);
  },[activeLine,loadConvs]);

  // polling de mensajes del chat abierto
  const loadMsgs=useCallback(()=>{
    if(!activeLine||!activeContact) return;
    api(`/api/messages?line=${activeLine}&contact=${activeContact}`)
      .then(d=>{setMessages(d.messages);setCanFreeText(d.canFreeText);})
      .catch(()=>{});
  },[activeLine,activeContact]);

  useEffect(()=>{ if(!activeContact) return;
    loadMsgs();
    const t=setInterval(loadMsgs,4000);
    return ()=>clearInterval(t);
  },[activeContact,loadMsgs]);

  // autoscroll
  useEffect(()=>{ const el=streamRef.current; if(el) el.scrollTop=el.scrollHeight; },[messages,activeContact]);

  const openChat=(contact)=>{
    setActiveContact(contact);setMobileView("chat");
    setConvs(cs=>cs.map(c=>c.contact===contact?{...c,unread:0}:c));
  };

  const send=async()=>{
    const text=draft.trim();
    if(!text||sending||!activeContact) return;
    setSending(true);
    const optimistic={id:"tmp"+Date.now(),dir:"out",type:"text",text,ts:Date.now(),status:"sending"};
    setMessages(m=>[...m,optimistic]);setDraft("");
    try{
      await api("/api/send",{method:"POST",body:JSON.stringify({line:activeLine,contact:activeContact,text})});
      loadMsgs();loadConvs();
    }catch(e){
      setMessages(m=>m.filter(x=>x.id!==optimistic.id));
      setDraft(text);
      showToast(e.data?.code==="OUT_OF_WINDOW"
        ? "Fuera de la ventana de 24 hs. Necesitás una plantilla aprobada."
        : (e.message||"No se pudo enviar"), true);
    }finally{ setSending(false); }
  };

  if(!ready) return html`<${Gate} onOk=${()=>setReady(true)} />`;

  const filtered=convs.filter(c=>{
    if(!q) return true;
    const s=q.toLowerCase();
    return (c.name||"").toLowerCase().includes(s)||c.contact.includes(s);
  });

  const active=convs.find(c=>c.contact===activeContact);

  return html`
    <div class=${"app view-"+mobileView} style=${{"--ln":lnColor}}>
      <!-- rail -->
      <div class="rail">
        <div class="brand">Consola</div>
        ${lines.map(l=>html`
          <button key=${l.id} class=${"linedot"+(l.id===activeLine?" active":"")+(l.configured?"":" off")}
            style=${{"--ln":l.color}} title=${l.label+(l.configured?"":" (sin configurar)")}
            onClick=${()=>setActiveLine(l.id)}>
            <span class="strip"></span>
            ${l.label.slice(0,2).toUpperCase()}
            ${unreadFor(convs,l,activeLine)>0 && html`<span class="dot">${unreadFor(convs,l,activeLine)}</span>`}
          </button>`)}
      </div>

      <!-- lista -->
      <div class="list">
        <div class="list-head">
          <h1><span class="swatch"></span>${curLine?curLine.label:"—"}</h1>
          <div class="sub mono">${curLine&&curLine.configured?"linea activa":"linea sin credenciales"}</div>
        </div>
        <div class="search">
          <input placeholder="Buscar por nombre o número" value=${q} onInput=${e=>setQ(e.target.value)} />
        </div>
        <div class="chats">
          ${filtered.length===0 && html`<div class="empty">
            ${convs.length===0
              ? "Todavía no llegaron mensajes a esta línea. Cuando alguien escriba, aparece acá."
              : "Sin resultados para la búsqueda."}
          </div>`}
          ${filtered.map(c=>html`
            <div key=${c.contact} class=${"chatrow"+(c.contact===activeContact?" active":"")}
              onClick=${()=>openChat(c.contact)}>
              <div class="top">
                <span class="name">${c.name||("+"+c.contact)}</span>
                <span class="time mono">${fmtRel(c.lastTs)}</span>
              </div>
              ${c.name && html`<span class="num mono">+${c.contact}</span>`}
              <div class="last">
                <span>${c.lastText||"—"}</span>
                ${c.unread>0 && html`<span class="badge">${c.unread}</span>`}
              </div>
            </div>`)}
        </div>
      </div>

      <!-- chat -->
      <div class="chat">
        ${!activeContact ? html`
          <div class="center">
            <div class="big">Elegí una conversación</div>
            <div>Los mensajes entrantes de <b>${curLine?curLine.label:"esta línea"}</b> aparecen a la izquierda.</div>
          </div>`
        : html`
          <div class="chat-head">
            <button class="back" onClick=${()=>setMobileView("list")}>‹</button>
            <div class="who">
              <div class="n">${active?.name||("+"+activeContact)}</div>
              <div class="c mono">+${activeContact}</div>
            </div>
            <div class="tag">${curLine?.label}</div>
          </div>

          <div class="stream" ref=${streamRef}>
            ${renderStream(messages)}
          </div>

          <div class="composer">
            ${!canFreeText && html`<div class="window-note">
              ⚠ Pasaron más de 24 hs desde el último mensaje del contacto. Solo podés reabrir con una plantilla aprobada.
            </div>`}
            <div class="box">
              <textarea rows="1" placeholder=${canFreeText?"Escribí una respuesta…":"Ventana cerrada — se requiere plantilla"}
                value=${draft} disabled=${!canFreeText}
                onInput=${e=>{setDraft(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px";}}
                onKeyDown=${e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} />
              <button class="send" onClick=${send} disabled=${sending||!draft.trim()||!canFreeText}>
                ${sending?html`<span class="spin"></span>`:"Enviar"}
              </button>
            </div>
          </div>`}
      </div>
    </div>
    ${toast && html`<div class=${"toast"+(toast.isErr?" err":"")}>${toast.m}</div>`}
  `;
}

// contador de no leídos agregados por línea (solo tenemos detalle de la activa;
// para las demás mostramos el badge solo si es la activa con datos cargados)
function unreadFor(convs,line,activeLine){
  if(line.id!==activeLine) return 0;
  return convs.reduce((a,c)=>a+(c.unread||0),0);
}

function renderStream(messages){
  const out=[];let lastDay=null;
  messages.forEach((m,i)=>{
    const day=fmtDay(m.ts);
    if(day!==lastDay){ out.push(html`<div key=${"d"+i} class="daysep">${day}</div>`); lastDay=day; }
    out.push(html`
      <div key=${m.id||i} class=${"bubble "+(m.dir==="in"?"in":"out")}>
        <div>${m.type!=="text"&&m.type!=="template"?html`<i style=${{opacity:.8}}>${m.text}</i>`:m.text}</div>
        <div class="meta">
          <span>${fmtTime(m.ts)}</span>
          ${m.dir==="out" && html`<span>· ${m.status==="sending"?"enviando":"enviado"}</span>`}
        </div>
      </div>`);
  });
  return out;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
</html>
