<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Consola · Mensajes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#14161a;          /* grafito */
    --panel:#1b1e24;       /* superficies */
    --panel-2:#22262e;     /* superficie elevada */
    --line:#2c313b;        /* bordes */
    --ink:#e8eaed;         /* texto principal */
    --ink-dim:#9aa2ad;     /* texto secundario */
    --ink-faint:#5f6773;   /* metadata */
    --accent:#e8b23a;      /* latón, acento neutro */
    --in:#22262e;          /* burbuja recibida */
    --out:#2a3546;         /* burbuja enviada */
    --danger:#d9634b;
    --ok:#4a9d6b;
    --radius:10px;
    --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:"Space Grotesk",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  #root{height:100vh}
  button{font-family:inherit;cursor:pointer}
  .mono{font-family:"JetBrains Mono",monospace}

  /* ---------- layout ---------- */
  .app{display:grid;grid-template-columns:78px 320px 1fr;height:100vh}
  @media (max-width:820px){
    .app{grid-template-columns:1fr}
    .rail,.list{display:none}
    .app.view-list .list{display:flex}
    .app.view-list .rail{display:flex}
    .app.view-list .chat{display:none}
    .app.view-chat .chat{display:flex}
  }

  /* ---------- rail de líneas ---------- */
  .rail{
    background:#101216;border-right:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;
    padding:16px 0;gap:14px;
  }
  .rail .brand{
    font-weight:700;font-size:11px;letter-spacing:.14em;
    color:var(--ink-faint);writing-mode:vertical-rl;transform:rotate(180deg);
    margin-bottom:6px;text-transform:uppercase;
  }
  .linedot{
    width:44px;height:44px;border-radius:50%;border:1px solid var(--line);
    background:var(--panel);color:var(--ink-dim);
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:14px;position:relative;
    transition:transform .15s ease,border-color .15s ease,box-shadow .15s ease;
  }
  .linedot:hover{transform:translateY(-2px) scale(1.04)}
  .linedot.active{border-color:var(--ln);color:#fff;box-shadow:0 0 0 3px color-mix(in srgb, var(--ln) 25%, transparent),var(--shadow)}
  .linedot .strip{position:absolute;left:-9px;top:50%;transform:translateY(-50%);width:3px;height:0;border-radius:3px;background:var(--ln);opacity:0;transition:opacity .15s,height .15s}
  .linedot.active .strip{opacity:1;height:20px}
  .linedot .dot{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:"JetBrains Mono",monospace;box-shadow:0 0 0 2px #101216}
  .linedot.off{opacity:.35}
  .linedot .ring{position:absolute;inset:-1px;border-radius:50%;border:1px solid transparent}

  /* ---------- lista de chats ---------- */
  .list{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0}
  .list-head{padding:18px 18px 12px;border-bottom:1px solid var(--line)}
  .list-head h1{margin:0;font-size:15px;font-weight:600;display:flex;align-items:center;gap:9px}
  .swatch{width:10px;height:10px;border-radius:3px;background:var(--ln)}
  .list-head .sub{margin-top:4px;font-size:11px;color:var(--ink-faint);letter-spacing:.02em;display:flex;align-items:center;gap:6px}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--ok);position:relative;flex:none}
  .pulse::after{content:"";position:absolute;inset:0;border-radius:50%;background:var(--ok);animation:pulse 1.8s ease-out infinite}
  @keyframes pulse{0%{opacity:.7;transform:scale(1)}100%{opacity:0;transform:scale(2.6)}}
  .search{padding:10px 14px;border-bottom:1px solid var(--line)}
  .search input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:8px 11px 8px 32px;font-size:13px;font-family:inherit;outline:none}
  .search input:focus{border-color:var(--ln)}
  .search{position:relative}
  .search svg{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:var(--ink-faint);pointer-events:none}
  .chats{overflow-y:auto;flex:1}
  .chatrow{padding:11px 16px;border-bottom:1px solid #23272f;display:flex;gap:11px;align-items:flex-start;position:relative;transition:background .1s}
  .chatrow:hover{background:var(--panel-2)}
  .chatrow.active{background:var(--panel-2)}
  .chatrow.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ln)}
  .chatrow .body{min-width:0;flex:1;display:flex;flex-direction:column;gap:3px}
  .chatrow .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .chatrow .name{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chatrow .num{font-size:11px;color:var(--ink-faint)}
  .chatrow .time{font-size:10.5px;color:var(--ink-faint);white-space:nowrap;flex:none}
  .chatrow .last{font-size:12px;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;justify-content:space-between;gap:8px}
  .badge{background:var(--ok);color:#04120a;border-radius:9px;min-width:18px;height:18px;padding:0 5px;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:"JetBrains Mono",monospace;flex:none}
  .empty{padding:40px 20px;text-align:center;color:var(--ink-faint);font-size:13px;line-height:1.6;display:flex;flex-direction:column;align-items:center;gap:12px}
  .empty svg{opacity:.35}

  /* ---------- avatar ---------- */
  .avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:13px;color:#fff;flex:none;letter-spacing:.02em;
    background:linear-gradient(155deg,var(--ac1),var(--ac2))}
  .avatar.sm{width:32px;height:32px;font-size:11.5px}

  /* ---------- ventana de chat ---------- */
  .chat{background:var(--bg);display:flex;flex-direction:column;min-width:0}
  .chat-head{padding:12px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;background:var(--panel)}
  .back{display:none;background:none;border:none;color:var(--ink-dim);font-size:20px;padding:0 4px}
  @media (max-width:820px){.back{display:block}}
  .chat-head .who{min-width:0}
  .chat-head .who .n{font-weight:600;font-size:14px}
  .chat-head .who .c{font-size:11.5px;color:var(--ink-faint)}
  .chat-head .tag{margin-left:auto;font-size:10.5px;color:var(--ln);border:1px solid var(--ln);padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:.04em}
  .stream{flex:1;overflow-y:auto;padding:22px 20px;display:flex;flex-direction:column;gap:8px;
    background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,.025) 1px, transparent 0);background-size:22px 22px}
  .bubble{max-width:66%;padding:9px 13px;border-radius:14px;font-size:13.5px;line-height:1.45;word-wrap:break-word;position:relative;
    animation:rise .18s ease}
  @keyframes rise{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .bubble .meta{font-size:10px;color:var(--ink-faint);margin-top:4px;font-family:"JetBrains Mono",monospace;display:flex;gap:5px;align-items:center;justify-content:flex-end}
  .bubble.in{align-self:flex-start;background:var(--in);border:1px solid var(--line);border-bottom-left-radius:4px}
  .bubble.in .meta{justify-content:flex-start}
  .bubble.out{align-self:flex-end;background:var(--out);border-bottom-right-radius:4px;box-shadow:var(--shadow)}
  .ticks{display:inline-flex;line-height:0}
  .ticks svg{color:var(--ink-faint)}
  .ticks.sent svg{color:var(--accent)}
  .daysep{align-self:center;font-size:10.5px;color:var(--ink-faint);background:var(--panel);padding:3px 12px;border-radius:20px;margin:6px 0;font-family:"JetBrains Mono",monospace;border:1px solid var(--line)}

  /* ---------- composer ---------- */
  .composer{border-top:1px solid var(--line);padding:12px 16px;background:var(--panel)}
  .window-note{font-size:11px;color:var(--danger);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .composer .box{display:flex;gap:10px;align-items:flex-end}
  .composer textarea{flex:1;resize:none;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:10px 12px;font-size:13.5px;font-family:inherit;max-height:120px;outline:none;line-height:1.4}
  .composer textarea:focus{border-color:var(--ln)}
  .send{background:var(--ln);color:#0d0f12;border:none;border-radius:10px;padding:0 18px;height:40px;font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:7px;transition:filter .1s,transform .1s}
  .send:not(:disabled):hover{filter:brightness(1.08)}
  .send:not(:disabled):active{transform:scale(.97)}
  .send:disabled{opacity:.35;cursor:not-allowed}

  /* ---------- placeholder / gate ---------- */
  .center{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ink-faint);gap:10px;text-align:center;padding:30px}
  .center svg{opacity:.3;margin-bottom:6px}
  .center .big{font-size:15px;color:var(--ink-dim)}
  .gate{position:fixed;inset:0;background:radial-gradient(circle at 30% 20%, #1c2530 0%, var(--bg) 60%);display:flex;align-items:center;justify-content:center;z-index:20}
  .gate .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:32px;width:340px;max-width:90vw;box-shadow:var(--shadow)}
  .gate .mark{width:46px;height:46px;border-radius:12px;background:linear-gradient(155deg,var(--accent),#c98f22);display:flex;align-items:center;justify-content:center;font-weight:700;color:#0d0f12;font-size:15px;margin-bottom:16px}
  .gate h2{margin:0 0 4px;font-size:16px}
  .gate p{margin:0 0 18px;font-size:12.5px;color:var(--ink-dim);line-height:1.5}
  .gate input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:10px 12px;font-size:13.5px;font-family:"JetBrains Mono",monospace;outline:none;margin-bottom:12px;transition:border-color .12s}
  .gate input:focus{border-color:var(--accent)}
  .gate button{width:100%;background:var(--accent);color:#0d0f12;border:none;border-radius:8px;padding:11px;font-weight:700;font-size:13.5px;transition:filter .1s}
  .gate button:hover{filter:brightness(1.08)}
  .gate .err{color:var(--danger);font-size:12px;margin-top:10px;min-height:16px}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel-2);border:1px solid var(--line);color:var(--ink);padding:10px 16px;border-radius:10px;font-size:13px;z-index:30;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:toastin .18s ease}
  @keyframes toastin{from{opacity:0;transform:translate(-50%,6px)}to{opacity:1;transform:translate(-50%,0)}}
  .toast.err{border-color:var(--danger)}
  .spin{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--ink-dim);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#2c313b;border-radius:5px}
  ::-webkit-scrollbar-track{background:transparent}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
<script>
// Fallback de CDN por si unpkg no responde.
(function(){
  function need(g,src){ if(!window[g]){ document.write('<script src="'+src+'"><\/script>'); } }
  need("React","https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js");
  need("ReactDOM","https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js");
  need("htm","https://cdn.jsdelivr.net/npm/htm@3.1.1/dist/htm.umd.js");
})();
</script>
<script>
// Si algo no cargó, mostramos un mensaje claro en vez de "Script error."
if(!window.React || !window.ReactDOM || !window.htm){
  document.getElementById("root").innerHTML =
    '<div style="color:#e8eaed;font-family:sans-serif;padding:40px;line-height:1.6">'+
    '<b>No se pudieron cargar las librerías (React/htm).</b><br>'+
    'Suele pasar sin conexión o al abrir el archivo con file://. '+
    'Subilo a Vercel o serví la carpeta con un servidor local.</div>';
  throw new Error("Librerías no cargadas");
}
window.addEventListener("error", function(e){
  console.error("Error capturado:", e.message, e.filename, e.lineno);
});

const { useState, useEffect, useRef, useCallback } = React;
const html = htm.bind(React.createElement);

// clave del panel guardada en memoria (no localStorage por restricción del entorno)
let PANEL_KEY = "";

async function api(path, opts = {}) {
  const headers = { "Content-Type": "application/json", ...(opts.headers||{}) };
  if (PANEL_KEY) headers["x-panel-key"] = PANEL_KEY;
  const res = await fetch(path, { ...opts, headers });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw Object.assign(new Error(data.error || "Error"), { data, status: res.status });
  return data;
}

function fmtTime(ts){
  if(!ts) return "";
  const d = new Date(ts);
  return d.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
}
function fmtDay(ts){
  const d = new Date(ts), t = new Date();
  const same = d.toDateString()===t.toDateString();
  const y = new Date(t.getTime()-864e5);
  if(same) return "Hoy";
  if(d.toDateString()===y.toDateString()) return "Ayer";
  return d.toLocaleDateString("es-AR",{day:"2-digit",month:"short"});
}
function fmtRel(ts){
  if(!ts) return "";
  const s=(Date.now()-ts)/1000;
  if(s<60) return "ahora";
  if(s<3600) return Math.floor(s/60)+"m";
  if(s<86400) return Math.floor(s/3600)+"h";
  return Math.floor(s/86400)+"d";
}

// ---------------- avatares e íconos ----------------
const AV_PAIRS = [
  ["#e07b39","#b85a1f"], ["#1a3a5c","#0e2338"], ["#2e7d5b","#1c5a3e"],
  ["#8a4fd1","#5e2fa0"], ["#d1477a","#a02958"], ["#3a9bd1","#1f6ea0"],
];
function avatarColors(seed){
  let h=0; for(let i=0;i<seed.length;i++) h=(h*31+seed.charCodeAt(i))>>>0;
  return AV_PAIRS[h%AV_PAIRS.length];
}
function initialsOf(name,contact){
  if(name && name.trim()){
    const parts=name.trim().split(/\s+/);
    return (parts[0][0]+(parts[1]?parts[1][0]:"")).toUpperCase();
  }
  return (contact||"").slice(-2);
}
function Avatar({name,contact,small}){
  const [ac1,ac2]=avatarColors(contact||name||"?");
  return html`<div class=${"avatar"+(small?" sm":"")} style=${{"--ac1":ac1,"--ac2":ac2}}>${initialsOf(name,contact)}</div>`;
}
const IconSearch=()=>html`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;
const IconSend=()=>html`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;
const IconChats=()=>html`<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
const IconClock=()=>html`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>`;
const IconCheck=({double})=>html`<span class=${"ticks"+(double?" sent":"")}>
  <svg width="14" height="11" viewBox="0 0 16 11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="1 5.5 5 9.5 10 2"/>${double && html`<polyline points="6 5.5 10 9.5 15 2"/>`}
  </svg></span>`;

// ---------------- Gate (clave del panel) ----------------
function Gate({ onOk }){
  const [v,setV]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const enter=async()=>{
    setBusy(true);setErr("");
    PANEL_KEY=v.trim();
    try{ await api("/api/lines"); onOk(); }
    catch(e){ setErr(e.status===401?"Clave incorrecta":"No se pudo conectar"); PANEL_KEY=""; }
    finally{ setBusy(false); }
  };
  return html`
    <div class="gate">
      <div class="card">
        <div class="mark">C</div>
        <h2>Consola de mensajes</h2>
        <p>Ingresá la clave de acceso del panel para continuar.</p>
        <input type="password" placeholder="Clave del panel" value=${v}
          onInput=${e=>setV(e.target.value)}
          onKeyDown=${e=>e.key==="Enter"&&enter()} autoFocus />
        <button onClick=${enter} disabled=${busy}>${busy?"Verificando…":"Entrar"}</button>
        <div class="err">${err}</div>
      </div>
    </div>`;
}

// ---------------- App ----------------
function App(){
  const [ready,setReady]=useState(false);
  const [lines,setLines]=useState([]);
  const [activeLine,setActiveLine]=useState(null);
  const [convs,setConvs]=useState([]);
  const [activeContact,setActiveContact]=useState(null);
  const [messages,setMessages]=useState([]);
  const [canFreeText,setCanFreeText]=useState(true);
  const [draft,setDraft]=useState("");
  const [sending,setSending]=useState(false);
  const [q,setQ]=useState("");
  const [mobileView,setMobileView]=useState("list");
  const [toast,setToast]=useState(null);
  const [lineUnreads,setLineUnreads]=useState({});
  const streamRef=useRef(null);

  const showToast=(m,isErr)=>{setToast({m,isErr});setTimeout(()=>setToast(null),3500);};

  // carga inicial de líneas
  useEffect(()=>{ if(!ready) return;
    api("/api/lines").then(d=>{
      setLines(d.lines);
      const first=d.lines.find(l=>l.configured)||d.lines[0];
      if(first) setActiveLine(first.id);
    }).catch(()=>showToast("No se pudieron cargar las líneas",true));
  },[ready]);

  const curLine=lines.find(l=>l.id===activeLine);
  const lnColor=curLine?curLine.color:"#e8b23a";

  // polling de conversaciones de la línea activa
  const loadConvs=useCallback(()=>{
    if(!activeLine) return;
    api(`/api/conversations?line=${activeLine}`)
      .then(d=>setConvs(d.conversations))
      .catch(()=>{});
  },[activeLine]);

  useEffect(()=>{ if(!activeLine) return;
    setConvs([]);setActiveContact(null);setMessages([]);
    loadConvs();
    const t=setInterval(loadConvs,5000);
    return ()=>clearInterval(t);
  },[activeLine,loadConvs]);

  // polling de no-leídos por línea (para el badge del rail), incluida la activa
  useEffect(()=>{
    const configured=lines.filter(l=>l.configured);
    if(!configured.length) return;
    let cancelled=false;
    const loadAll=async()=>{
      const entries=await Promise.all(configured.map(async l=>{
        try{ const d=await api(`/api/conversations?line=${l.id}`);
          return [l.id, d.conversations.reduce((a,c)=>a+(c.unread||0),0)];
        }catch{ return [l.id,0]; }
      }));
      if(!cancelled) setLineUnreads(Object.fromEntries(entries));
    };
    loadAll();
    const t=setInterval(loadAll,8000);
    return ()=>{cancelled=true;clearInterval(t);};
  },[lines]);

  // polling de mensajes del chat abierto
  const loadMsgs=useCallback(()=>{
    if(!activeLine||!activeContact) return;
    api(`/api/messages?line=${activeLine}&contact=${activeContact}`)
      .then(d=>{setMessages(d.messages);setCanFreeText(d.canFreeText);})
      .catch(()=>{});
  },[activeLine,activeContact]);

  useEffect(()=>{ if(!activeContact) return;
    loadMsgs();
    const t=setInterval(loadMsgs,4000);
    return ()=>clearInterval(t);
  },[activeContact,loadMsgs]);

  // autoscroll
  useEffect(()=>{ const el=streamRef.current; if(el) el.scrollTop=el.scrollHeight; },[messages,activeContact]);

  const openChat=(contact)=>{
    setActiveContact(contact);setMobileView("chat");
    setConvs(cs=>cs.map(c=>c.contact===contact?{...c,unread:0}:c));
  };

  const send=async()=>{
    const text=draft.trim();
    if(!text||sending||!activeContact) return;
    setSending(true);
    const optimistic={id:"tmp"+Date.now(),dir:"out",type:"text",text,ts:Date.now(),status:"sending"};
    setMessages(m=>[...m,optimistic]);setDraft("");
    try{
      await api("/api/send",{method:"POST",body:JSON.stringify({line:activeLine,contact:activeContact,text})});
      loadMsgs();loadConvs();
    }catch(e){
      setMessages(m=>m.filter(x=>x.id!==optimistic.id));
      setDraft(text);
      showToast(e.data?.code==="OUT_OF_WINDOW"
        ? "Fuera de la ventana de 24 hs. Necesitás una plantilla aprobada."
        : (e.message||"No se pudo enviar"), true);
    }finally{ setSending(false); }
  };

  if(!ready) return html`<${Gate} onOk=${()=>setReady(true)} />`;

  const filtered=convs.filter(c=>{
    if(!q) return true;
    const s=q.toLowerCase();
    return (c.name||"").toLowerCase().includes(s)||c.contact.includes(s);
  });

  const active=convs.find(c=>c.contact===activeContact);

  return html`
    <div class=${"app view-"+mobileView} style=${{"--ln":lnColor}}>
      <!-- rail -->
      <div class="rail">
        <div class="brand">Consola</div>
        ${lines.map(l=>html`
          <button key=${l.id} class=${"linedot"+(l.id===activeLine?" active":"")+(l.configured?"":" off")}
            style=${{"--ln":l.color}} title=${l.label+(l.configured?"":" (sin configurar)")}
            onClick=${()=>setActiveLine(l.id)}>
            <span class="strip"></span>
            ${l.label.slice(0,2).toUpperCase()}
            ${(lineUnreads[l.id]||0)>0 && html`<span class="dot">${lineUnreads[l.id]}</span>`}
          </button>`)}
      </div>

      <!-- lista -->
      <div class="list">
        <div class="list-head">
          <h1><span class="swatch"></span>${curLine?curLine.label:"—"}</h1>
          <div class="sub mono">${curLine&&curLine.configured?html`<span class="pulse"></span>en vivo`:"linea sin credenciales"}</div>
        </div>
        <div class="search">
          <${IconSearch} />
          <input placeholder="Buscar por nombre o número" value=${q} onInput=${e=>setQ(e.target.value)} />
        </div>
        <div class="chats">
          ${filtered.length===0 && html`<div class="empty">
            <${IconChats} />
            <div>${convs.length===0
              ? "Todavía no llegaron mensajes a esta línea. Cuando alguien escriba, aparece acá."
              : "Sin resultados para la búsqueda."}</div>
          </div>`}
          ${filtered.map(c=>html`
            <div key=${c.contact} class=${"chatrow"+(c.contact===activeContact?" active":"")}
              onClick=${()=>openChat(c.contact)}>
              <${Avatar} name=${c.name} contact=${c.contact} />
              <div class="body">
                <div class="top">
                  <span class="name">${c.name||("+"+c.contact)}</span>
                  <span class="time mono">${fmtRel(c.lastTs)}</span>
                </div>
                ${c.name && html`<span class="num mono">+${c.contact}</span>`}
                <div class="last">
                  <span>${c.lastText||"—"}</span>
                  ${c.unread>0 && html`<span class="badge">${c.unread}</span>`}
                </div>
              </div>
            </div>`)}
        </div>
      </div>

      <!-- chat -->
      <div class="chat">
        ${!activeContact ? html`
          <div class="center">
            <${IconChats} />
            <div class="big">Elegí una conversación</div>
            <div>Los mensajes entrantes de <b>${curLine?curLine.label:"esta línea"}</b> aparecen a la izquierda.</div>
          </div>`
        : html`
          <div class="chat-head">
            <button class="back" onClick=${()=>setMobileView("list")}>‹</button>
            <${Avatar} name=${active?.name} contact=${activeContact} small=${true} />
            <div class="who">
              <div class="n">${active?.name||("+"+activeContact)}</div>
              <div class="c mono">+${activeContact}</div>
            </div>
            <div class="tag">${curLine?.label}</div>
          </div>

          <div class="stream" ref=${streamRef}>
            ${renderStream(messages)}
          </div>

          <div class="composer">
            ${!canFreeText && html`<div class="window-note">
              ⚠ Pasaron más de 24 hs desde el último mensaje del contacto. Solo podés reabrir con una plantilla aprobada.
            </div>`}
            <div class="box">
              <textarea rows="1" placeholder=${canFreeText?"Escribí una respuesta…":"Ventana cerrada — se requiere plantilla"}
                value=${draft} disabled=${!canFreeText}
                onInput=${e=>{setDraft(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px";}}
                onKeyDown=${e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} />
              <button class="send" onClick=${send} disabled=${sending||!draft.trim()||!canFreeText}>
                ${sending?html`<span class="spin"></span>`:html`<${IconSend} />Enviar`}
              </button>
            </div>
          </div>`}
      </div>
    </div>
    ${toast && html`<div class=${"toast"+(toast.isErr?" err":"")}>${toast.m}</div>`}
  `;
}

function renderStream(messages){
  const out=[];let lastDay=null;
  messages.forEach((m,i)=>{
    const day=fmtDay(m.ts);
    if(day!==lastDay){ out.push(html`<div key=${"d"+i} class="daysep">${day}</div>`); lastDay=day; }
    out.push(html`
      <div key=${m.id||i} class=${"bubble "+(m.dir==="in"?"in":"out")}>
        <div>${m.type!=="text"&&m.type!=="template"?html`<i style=${{opacity:.8}}>${m.text}</i>`:m.text}</div>
        <div class="meta">
          <span>${fmtTime(m.ts)}</span>
          ${m.dir==="out" && (m.status==="sending"?html`<${IconClock} />`:html`<${IconCheck} double=${true} />`)}
        </div>
      </div>`);
  });
  return out;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
</html>
